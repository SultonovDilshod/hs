const formatNumber = (n) => {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n?.toString() || '—';
};
const formatCurrency = (n) => {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + (n/1000).toFixed(0) + 'K';
  return '$' + (n || 0);
};

const MiniSparkline = ({data, color='#06B6D4', width=80, height=24}) => {
  if (!data || data.length === 0) return null;
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const points = data.map((v,i) => `${(i/(data.length-1))*width},${height - ((v-min)/range)*height}`).join(' ');
  return (
    <svg width={width} height={height} className="inline-block">
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

const StatusBadge = ({status}) => {
  const styles = {
    active: 'bg-status-green/15 text-status-green border-status-green/30',
    draft: 'bg-status-amber/15 text-status-amber border-status-amber/30',
    archived: 'bg-txt-muted/15 text-txt-muted border-txt-muted/30',
    new: 'bg-accent-cyan/15 text-accent-cyan border-accent-cyan/30',
    strengthened: 'bg-status-green/15 text-status-green border-status-green/30',
    weakened: 'bg-status-amber/15 text-status-amber border-status-amber/30',
  };
  const labels = { active:'Faol', draft:'Qoralama', archived:'Arxiv', new:'Yangi', strengthened:'Kuchaygan', weakened:'Susaygan' };
  return <span className={`tag border ${styles[status]}`}>{labels[status]}</span>;
};

const CustomTooltip = ({active, payload, label}) => {
  if (!active || !payload?.length) return null;
  return (
    <div className="glass rounded-lg px-3 py-2 text-xs" style={{border:'1px solid #1F2F4D'}}>
      <p className="text-txt-secondary mb-1 font-medium">{label}</p>
      {payload.map((p,i) => (
        <p key={i} style={{color:p.color}} className="flex items-center gap-2">
          <span className="w-2 h-2 rounded-full inline-block" style={{background:p.color}}/>
          {p.name}: <span className="font-semibold text-txt-primary">{typeof p.value === 'number' && p.value > 999 ? formatNumber(p.value) : p.value}{p.name?.includes('rate') || p.name?.includes('Rate') ? '%' : ''}</span>

      ))}
    </div>
  );
};

const MonitoringPage = () => {
  const [selectedRule, setSelectedRule] = useState(null);
  const [filterType, setFilterType] = useState('all');

  const activeRules = MOCK.rules.filter(r => {
    if (filterType === 'all') return r.status === 'active';
    return r.status === 'active' && r.type === filterType;
  });

  const activeForKpi = MOCK.rules.filter(r => r.status === 'active' && r.hitRate != null);
  const avgHit = activeForKpi.length ? (activeForKpi.reduce((s,r) => s+r.hitRate, 0) / activeForKpi.length).toFixed(1) : '0.0';
  const avgFp = activeForKpi.length ? (activeForKpi.reduce((s,r) => s+r.falsePositive, 0) / activeForKpi.length).toFixed(1) : '0.0';
  const totalCov = activeForKpi.reduce((s,r) => s+(r.coverage||0), 0).toFixed(1);
  const totalRev = activeForKpi.reduce((s,r) => s+(r.revenueRecovered||0), 0);

  const kpis = [
    {label:'O\'rtacha hit rate',value:avgHit+'%',change:'+3.2%',up:true,icon:'target',color:'#06B6D4'},
    {label:'O\'rtacha false positive',value:avgFp+'%',change:'-2.1%',up:false,icon:'alertTriangle',color:'#F59E0B'},
    {label:'Jami coverage',value:totalCov+'%',change:'+1.8%',up:true,icon:'layers',color:'#06B6D4'},
    {label:'Qaytarilgan daromad',value:formatCurrency(totalRev),change:'+12.4%',up:true,icon:'dollarSign',color:'#10B981'},
  ];

  // alerts for declining rules
  const decliningRules = MOCK.rules.filter(r => r.status === 'active' && r.hitRateTrend.length >= 2 && r.hitRateTrend[r.hitRateTrend.length-1] < r.hitRateTrend[0]);

  return (
    <div className="animate-fade">
      {/* KPI Cards */}
      <div className="grid grid-cols-4 gap-4 mb-6">
        {kpis.map((k,i) => (
          <div key={i} className={`glass rounded-xl p-5 stat-card card-glow animate-in stagger-${i+1}`}>
            <div className="flex items-center justify-between mb-3">
              <span className="text-xs text-txt-secondary font-medium uppercase tracking-wider">{k.label}</span>
              <span style={{color:k.color}} className="opacity-60"><Icon name={k.icon} size={16}/></span>
            </div>
            <div className="text-2xl font-bold mb-1" style={{color:k.color}}>{k.value}</div>
            <div className={`text-xs flex items-center gap-1 ${k.up?'text-status-green':'text-status-green'}`}>
              <Icon name={k.up?'trendUp':'trendDown'} size={12}/>{k.change} so'nggi oy
            </div>
          </div>
        ))}
      </div>

      {/* Alerts */}
      {decliningRules.length > 0 && (
        <div className="bg-status-amber/5 border border-status-amber/20 rounded-xl p-4 mb-5 animate-in stagger-2">
          <div className="flex items-center gap-2 mb-2">
            <Icon name="alertTriangle" size={16} className="text-status-amber"/>
            <span className="text-sm font-semibold text-status-amber">Ogohlantirish: samaradorligi pasaygan qoidalar</span>
          </div>
          <div className="flex gap-3 flex-wrap">
            {decliningRules.map(r => (
              <span key={r.id} className="tag bg-status-amber/10 text-status-amber border border-status-amber/20 text-xs">
                {r.name} — {r.hitRate}% (↓)
              </span>
            ))}
          </div>
        </div>
      )}

      {/* Filter + Table */}
      <div className="glass rounded-xl animate-in stagger-3">
        <div className="flex items-center gap-4 p-4 border-b border-surface-300/50">
          <h3 className="text-sm font-semibold text-txt-primary">Faol qoidalar monitoringi</h3>
          <div className="ml-auto flex gap-2">
            {['all','statistical','business'].map(v => (
              <button key={v} onClick={() => setFilterType(v)}
                className={`px-3 py-1 rounded text-xs font-medium transition-all ${filterType===v ? 'bg-accent-cyan/20 text-accent-cyan border border-accent-cyan/40' : 'bg-surface-200 text-txt-muted border border-transparent hover:text-txt-secondary'}`}>
                {v==='all'?'Barchasi':v==='statistical'?'Statistik':'Biznes'}
              </button>
            ))}
          </div>
        </div>

        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="border-b border-surface-300/50">
                {['Nomi','Turi','Hit rate','Trend','False +','Coverage','Revenue','Yoshi',''].map((h,i) => (
                  <th key={i} className="px-4 py-3 text-left text-txt-muted font-medium uppercase tracking-wider text-[10px]">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {activeRules.map((r,i) => {
                const ageMonths = r.activeSince ? Math.round((new Date('2025-03-15') - new Date(r.activeSince)) / (1000*60*60*24*30)) : 0;
                const trendUp = r.hitRateTrend.length >= 2 && r.hitRateTrend[r.hitRateTrend.length-1] >= r.hitRateTrend[0];
                return (
                  <tr key={r.id} className="pattern-row border-b border-surface-300/30 last:border-0" onClick={() => setSelectedRule(selectedRule?.id === r.id ? null : r)}>
                    <td className="px-4 py-3">
                      <div className="font-medium text-txt-primary text-sm">{r.name}</div>
                      <div className="font-mono text-[10px] text-txt-dim mt-0.5">{r.id}</div>
                    </td>
                    <td className="px-4 py-3">
                      <span className={`tag border text-[10px] ${r.type==='statistical'?'bg-accent-cyan/10 text-accent-cyan border-accent-cyan/20':'bg-accent-cyan/5 text-accent-cyan/70 border-accent-cyan/15'}`}>
                        {r.type==='statistical'?'Statistik':'Biznes'}
                      </span>
                    </td>
                    <td className="px-4 py-3">
                      <span className="text-sm font-bold text-accent-cyan">{r.hitRate}%</span>
                    </td>
                    <td className="px-4 py-3">
                      <MiniSparkline data={r.hitRateTrend} color={trendUp?'#10B981':'#F59E0B'}/>

                    <td className="px-4 py-3">
                      <span className={`text-sm font-semibold ${r.falsePositive > 30 ? 'text-status-amber' : r.falsePositive > 20 ? 'text-status-amber' : 'text-status-green'}`}>
                        {r.falsePositive}%
                      </span>
                    </td>
                    <td className="px-4 py-3 text-sm text-txt-secondary">{r.coverage}%</td>
                    <td className="px-4 py-3 text-sm font-semibold text-status-green">{formatCurrency(r.revenueRecovered)}</td>
                    <td className="px-4 py-3 text-sm text-txt-secondary">{ageMonths} oy</td>
                    <td className="px-4 py-3">
                      <button className="text-txt-muted hover:text-accent-cyan transition-colors"><Icon name="eye" size={14}/></button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Selected Rule Detail */}
      {selectedRule && (
        <div className="glass rounded-xl p-5 mt-5 animate-in">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-semibold text-txt-primary">{selectedRule.name} — batafsil</h3>
            <button onClick={() => setSelectedRule(null)} className="text-txt-muted hover:text-txt-primary"><Icon name="x" size={16}/></button>
          </div>
          <div className="font-mono text-xs text-txt-secondary bg-surface-50/50 rounded px-3 py-2 mb-4 border border-surface-300/50">
            {selectedRule.condition}
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <h4 className="text-xs font-semibold text-txt-secondary mb-3">Hit rate trendi</h4>
              <ResponsiveContainer width="100%" height={160}>
                <AreaChart data={selectedRule.hitRateTrend.map((v,i) => ({week:`Hafta ${i+1}`,rate:v}))}>
                  <defs>
                    <linearGradient id="gradTrend" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#06B6D4" stopOpacity={0.3}/>
                      <stop offset="100%" stopColor="#06B6D4" stopOpacity={0}/>
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1A2740" vertical={false}/>
                  <XAxis dataKey="week" tick={{fill:'#64748B',fontSize:10}} axisLine={false} tickLine={false}/>
                  <YAxis domain={['dataMin-5','dataMax+5']} tick={{fill:'#64748B',fontSize:10}} axisLine={false} tickLine={false}/>
                  <Tooltip content={<CustomTooltip/>}/>
                  <Area type="monotone" dataKey="rate" stroke="#06B6D4" fill="url(#gradTrend)" strokeWidth={2} name="Hit rate"/>
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <div className="grid grid-cols-2 gap-3">
              {[
                {l:'Jami flagged',v:selectedRule.flagged,c:'text-txt-primary'},
                {l:'Tasdiqlangan',v:selectedRule.confirmed,c:'text-status-green'},
                {l:'False positive',v:selectedRule.flagged - selectedRule.confirmed,c:'text-status-amber'},
                {l:'Oxirgi ishga tushdi',v:selectedRule.lastTriggered?.slice(5)||'—',c:'text-txt-secondary'},
              ].map((s,i) => (
                <div key={i} className="bg-surface-200 rounded-lg p-3">
                  <div className="text-[10px] text-txt-muted mb-1">{s.l}</div>
                  <div className={`text-lg font-bold ${s.c}`}>{s.v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

  const addCondition = () => {
    setBuilderConditions([...builderConditions, {indicator:'country',operator:'=',value:''}]);
  };
  const removeCondition = (i) => {
    setBuilderConditions(builderConditions.filter((_,j) => j !== i));

    nc[i] = {...nc[i], [field]: val};
    setBuilderConditions(nc);

    setTestResult({
      totalAffected: Math.floor(Math.random()*200)+50,

            </div>

            <div className="flex gap-2">
              <button onClick={addCondition} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-300 text-txt-secondary text-xs font-medium hover:bg-surface-400 transition-colors">
                <Icon name="plus" size={14}/> Shart qo'shish
              </button>
            </div>

            <div className="mt-5 pt-4 border-t border-surface-300/50">
              <div className="font-mono text-xs text-accent-cyan bg-surface-50 rounded-lg px-3 py-2 mb-4 border border-surface-300/50">
                {builderConditions.map((c,i) => `${i>0?' AND ':''}${c.indicator.toUpperCase()} ${c.operator} ${c.value||'?'}`).join('')}
              </div>
              <div className="flex gap-2">
                <button onClick={runTest} className="flex items-center gap-2 px-4 py-2 rounded-lg bg-accent-cyan/20 text-accent-cyan text-sm font-medium hover:bg-accent-cyan/30 transition-colors border border-accent-cyan/30">
                  <Icon name="play" size={14}/> Sinov o'tkazish
                </button>
                <button className="flex items-center gap-2 px-4 py-2 rounded-lg bg-accent-cyan/20 text-accent-cyan text-sm font-medium hover:bg-accent-cyan/30 transition-colors border border-accent-cyan/30">
                  <Icon name="check" size={14}/> Saqlash va faollashtirish
                </button>
                <button className="flex items-center gap-2 px-4 py-2 rounded-lg bg-surface-300 text-txt-secondary text-sm font-medium hover:bg-surface-400 transition-colors">
                  Qoralama sifatida saqlash
                </button>
              </div>
            </div>
          </div>

          {/* Test Results */}
          <div className="col-span-2 glass rounded-xl p-5 animate-in stagger-3">
            <h3 className="text-sm font-semibold text-txt-primary mb-4">Sinov natijalari</h3>
            {testResult ? (
              <div className="animate-fade">
                <div className="grid grid-cols-2 gap-3 mb-4">
                  <div className="bg-surface-200 rounded-lg p-3">
                    <div className="text-[10px] text-txt-muted mb-1">Ta'sirlangan deklaratsiyalar</div>
                    <div className="text-xl font-bold text-accent-cyan">{testResult.totalAffected}</div>
                  </div>
                  <div className="bg-surface-200 rounded-lg p-3">
                    <div className="text-[10px] text-txt-muted mb-1">Taxminiy hit rate</div>
                    <div className="text-xl font-bold text-accent-cyan">{testResult.estimatedHitRate}%</div>
                  </div>
                  <div className="col-span-2 bg-surface-200 rounded-lg p-3">
                    <div className="text-[10px] text-txt-muted mb-1">Taxminiy revenue impact</div>
                    <div className="text-xl font-bold text-status-green">{formatCurrency(testResult.estimatedRevenue)}</div>
                  </div>
                </div>

                <h4 className="text-xs font-semibold text-txt-secondary mb-2">Mos deklaratsiya namunalari</h4>
                <div className="space-y-2">
                  {testResult.sampleMatches.map((m,i) => (
                    <div key={i} className="bg-surface-50 rounded-lg p-2.5 border border-surface-300/50 text-xs">
                      <div className="flex items-center justify-between">
                        <span className="font-mono text-accent-cyan">{m.id}</span>
                        <span className="text-txt-muted">{m.country}</span>
                      </div>
                      <div className="font-mono text-txt-dim mt-1">HS: {m.hs} · {m.importer}</div>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="flex flex-col items-center justify-center py-12 text-center">
                <div className="w-12 h-12 rounded-full bg-surface-200 flex items-center justify-center mb-3">
                  <Icon name="play" size={20} className="text-txt-dim"/>
                </div>
                <p className="text-sm text-txt-muted mb-1">Hali sinov o'tkazilmagan</p>
                <p className="text-xs text-txt-dim">Qoidani to'ldiring va "Sinov o'tkazish" tugmasini bosing</p>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

              </div>
              <div>

                  <Icon name={p.icon} size={15}/>{p.label}

            {/* Right side */}
            <div className="ml-auto flex items-center gap-3">

                <span className="text-[10px] text-txt-muted">Tizim faol</span>
